<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" role="img" aria-labelledby="title desc">
  <title id="title">FreshMart SQL analysis illustration</title><desc id="desc">A SQL query editor and ranked commercial results.</desc>
  <rect width="760" height="440" fill="#071b2d"/><g transform="translate(38 38)" font-family="monospace"><rect width="684" height="364" rx="18" fill="#102b43"/><circle cx="24" cy="24" r="6" fill="#e66a6a"/><circle cx="44" cy="24" r="6" fill="#d8a83e"/><circle cx="64" cy="24" r="6" fill="#2aa198"/><text x="24" y="70" fill="#aee8e3" font-size="14">SELECT</text><text x="88" y="70" fill="#ffffff" font-size="14">product_name, SUM(revenue) AS total_revenue</text><text x="24" y="99" fill="#aee8e3" font-size="14">FROM</text><text x="72" y="99" fill="#ffffff" font-size="14">sales</text><text x="24" y="128" fill="#aee8e3" font-size="14">GROUP BY</text><text x="104" y="128" fill="#ffffff" font-size="14">product_name</text><text x="24" y="157" fill="#aee8e3" font-size="14">ORDER BY</text><text x="104" y="157" fill="#ffffff" font-size="14">total_revenue DESC;</text><g transform="translate(24 195)" font-family="Arial"><rect width="636" height="135" rx="10" fill="#ffffff"/><text x="18" y="28" fill="#5c6b77" font-size="11" font-weight="700">RANK</text><text x="85" y="28" fill="#5c6b77" font-size="11" font-weight="700">PRODUCT</text><text x="500" y="28" fill="#5c6b77" font-size="11" font-weight="700">RESULT</text><path d="M18 42 H618" stroke="#dce6eb"/><g fill="#17324d" font-size="13"><text x="18" y="68">01</text><text x="85" y="68">Top-performing category</text><text x="500" y="68">Ranked</text><text x="18" y="98">02</text><text x="85" y="98">Commercial segment</text><text x="500" y="98">Compared</text><text x="18" y="124">03</text><text x="85" y="124">Inventory question</text><text x="500" y="124">Answered</text></g></g></g>
