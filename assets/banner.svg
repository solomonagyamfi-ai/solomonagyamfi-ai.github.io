  <text x="280" y="112" fill="#ffffff" font-family="Arial, sans-serif" font-size="46" font-weight="700">SOLOMON GYAMFI</text>
  <text x="282" y="158" fill="#AEE8E3" font-family="Arial, sans-serif" font-size="25" font-weight="600">HR &amp; DATA ANALYTICS PROFESSIONAL</text>
  <text x="282" y="206" fill="#E6F2F5" font-family="Arial, sans-serif" font-size="22">Turning business questions into practical decisions.</text>
  <g transform="translate(920 75)" fill="none" stroke="#AEE8E3" stroke-width="7" stroke-linecap="round">
